name: Web CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new push happens on the same branch
concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege: only grant permissions needed for the job
permissions:
  contents: read
  deployments: write  # For deploy job status reporting

env:
  NODE_VERSION: '24'

jobs:
  build:
    name: Build & Type-check (Web)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false  # waqup-app submodule has no .gitmodules URL; build doesn't need it

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Cache node_modules for faster installs (monorepo)
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/web/node_modules
            packages/shared/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # Cache Next.js build output for faster rebuilds
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: packages/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('packages/web/**', 'packages/shared/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared
        run: npm run build:shared

      - name: Lint web
        working-directory: packages/web
        run: npm run lint

      - name: Type-check web
        working-directory: packages/web
        run: npx tsc --noEmit

      - name: Build web (production)
        working-directory: packages/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: https://placeholder.example.com
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/web/node_modules
            packages/shared/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: packages/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('packages/web/**', 'packages/shared/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared
        run: npm run build:shared

      - name: Build web (production)
        working-directory: packages/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_ENABLE_TEST_LOGIN: 'true'
          OVERRIDE_LOGIN_EMAIL: test@waqup.app
          OVERRIDE_LOGIN_PASSWORD: testpass123
          NEXT_PUBLIC_OVERRIDE_LOGIN_EMAIL: test@waqup.app
          NEXT_PUBLIC_OVERRIDE_LOGIN_PASSWORD: testpass123
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/web

      - name: Run E2E tests
        working-directory: packages/web
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_ENABLE_TEST_LOGIN: 'true'
          OVERRIDE_LOGIN_EMAIL: test@waqup.app
          OVERRIDE_LOGIN_PASSWORD: testpass123
          NEXT_PUBLIC_OVERRIDE_LOGIN_EMAIL: test@waqup.app
          NEXT_PUBLIC_OVERRIDE_LOGIN_PASSWORD: testpass123
        # CI uses placeholder Supabase; authenticated specs need real Supabase + seed.
        # Run public-only E2E in CI; full E2E (including protected) runs locally with real Supabase.
        run: npx playwright test --project=desktop-chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: packages/web/test-results/
          retention-days: 7

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false  # waqup-app submodule has no .gitmodules URL; build doesn't need it

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/web/node_modules
            packages/shared/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Pull Vercel environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --target=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --archive=split-tgz --token=${{ secrets.VERCEL_TOKEN }}
