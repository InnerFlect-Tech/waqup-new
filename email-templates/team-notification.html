<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 24px; background: #f5f5f5; }
    .card { background: #fff; border-radius: 12px; padding: 24px; border: 1px solid #e0e0e0; max-width: 560px; }
    h2 { font-size: 18px; margin: 0 0 16px; color: #333; }
    pre { background: #f9f9f9; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
    .meta { font-size: 12px; color: #666; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>New {{table}} submission</h2>
    <pre>{{recordSummary}}</pre>
    <p class="meta">Received at {{timestamp}}</p>
  </div>
</body>
</html>
