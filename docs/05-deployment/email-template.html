<!DOCTYPE html>
<html lang="{{locale}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{headline}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:1.5;color:#1A1A1A;background-color:#1a0a2e;background-image:linear-gradient(180deg,#1a0a2e 0%,#2d1b4e 40%,#1a0a2e 100%);">
  <!-- Preheader: 40–130 chars, hidden from view but shown in inbox preview -->
  <div style="display:none;max-height:0;overflow:hidden;">{{preheader}}</div>
  <div style="display:none;max-height:0;overflow:hidden;">&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;</div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="min-height:100vh;background-color:#1a0a2e;background-image:linear-gradient(180deg,#1a0a2e 0%,#2d1b4e 30%,#3b2760 60%,#1a0a2e 100%);">
    <tr>
      <td align="center" style="padding:40px 16px;background-color:transparent;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" align="center" style="max-width:600px;width:100%;">
          <!-- Hero header (dark) -->
          <tr>
            <td style="padding:0;background-color:#1a0a2e;background-image:linear-gradient(135deg,#1a0a2e 0%,#2d1b4e 40%,#1f0f3a 100%);border-radius:16px 16px 0 0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding:32px 32px 28px;text-align:center;">
                    <a href="https://waqup.app" style="text-decoration:none;font-family:Arial,Helvetica,sans-serif;font-size:28px;font-weight:300;letter-spacing:-1px;color:#FFFFFF;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;">
                      wa<span style="color:#A855F7;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;">Q</span>up
                    </a>
                    <p style="margin:20px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:14px;color:rgba(255,255,255,0.9);letter-spacing:1.5px;text-transform:uppercase;">
                      Voice-first transformation
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Main content card (white) -->
          <tr>
            <td style="padding:0;background-color:#FFFFFF;border-radius:0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding:36px 32px 24px;">
                    <h1 style="margin:0 0 16px;font-family:Arial,Helvetica,sans-serif;font-size:28px;font-weight:300;line-height:1.3;color:#1A1A1A;">
                      {{headline}}
                    </h1>
                    <div style="font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:1.65;color:#1A1A1A;">
                      {{body_html}}
                    </div>
                    <!-- CTA button (bulletproof - HTML/CSS, not image). Handlebars: omit when cta_url empty. -->
                    {{#if cta_url}}
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:24px;">
                      <tr>
                        <td>
                          <a href="{{cta_url}}" style="display:inline-block;padding:16px 36px;background-color:#9333EA;background-image:linear-gradient(135deg,#9333EA,#7C3AED);color:#FFFFFF;font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:600;text-decoration:none;border-radius:16px;">
                            {{cta_text}}
                          </a>
                        </td>
                      </tr>
                    </table>
                    {{/if}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Footer (dark) -->
          <tr>
            <td style="padding:24px 32px;background-color:#1a0a2e;border-radius:0 0 16px 16px;">
              <p style="margin:0 0 8px;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.5;">
                <a href="{{unsubscribe_url}}" style="color:#C4B5FD;text-decoration:underline;">Unsubscribe</a>
                {{#if preferences_url}}
                <span style="color:rgba(255,255,255,0.5);"> · </span>
                <a href="{{preferences_url}}" style="color:#C4B5FD;text-decoration:underline;">Manage preferences</a>
                {{/if}}
              </p>
              <p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.5;color:rgba(255,255,255,0.5);">
                waQup · &copy; {{year}}
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
